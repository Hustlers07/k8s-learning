apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-demo
spec:
  replicas: 1
  replicas: 1
  selector:
    matchLabels:
      app: spring-demo
  template:
    metadata:
      labels:
        app: spring-demo
    spec:
      containers:
      - name: spring-demo
        image: spring-demo:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        livenessProbe:
          httpGet:
            path: /demo/actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /demo/actuator/health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 500
---
apiVersion: v1
kind: Service
metadata:
  name: spring-demo-service
spec:
  selector: 
    app: spring-demo
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
    nodePort: 30003
  type: NodePort
